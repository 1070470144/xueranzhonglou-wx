<style>
  .arena {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
  }
  .concept {
    min-height: 470px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(8, 14, 18, 0.48), rgba(3, 7, 9, 0.9)),
      url("file:///C:/Users/mengmenglv/AppData/Local/Temp/codex-clipboard-c26044d0-2d33-444b-8990-82e894c3f925.png") center / cover;
    cursor: pointer;
  }
  .concept:hover {
    border-color: rgba(255, 255, 255, 0.34);
  }
  .scene {
    position: relative;
    height: 330px;
  }
  .seat {
    position: absolute;
    display: grid;
    justify-items: center;
    gap: 9px;
  }
  .poison-seat {
    left: 38px;
    top: 45px;
  }
  .drunk-seat {
    right: 34px;
    top: 100px;
  }
  .both-seat {
    left: 104px;
    bottom: 28px;
  }
  .token {
    position: relative;
    width: 92px;
    aspect-ratio: 1;
    border-radius: 50%;
    border: 5px solid #050505;
    background:
      radial-gradient(circle at 50% 44%, rgba(255, 255, 255, 0.86), rgba(218, 218, 211, 0.74) 43%, rgba(115, 115, 109, 0.64)),
      repeating-linear-gradient(28deg, rgba(255, 255, 255, 0.12) 0 6px, rgba(0, 0, 0, 0.05) 6px 10px);
    box-shadow: 0 4px 0 #101010, inset 0 0 18px rgba(255, 255, 255, 0.32);
    display: grid;
    place-items: center;
    color: #101316;
    font-size: 15px;
    font-weight: 900;
    text-align: center;
    line-height: 1.05;
    isolation: isolate;
  }
  .label {
    min-width: 112px;
    padding: 6px 14px;
    border: 5px solid #050505;
    border-radius: 14px;
    background: rgba(9, 32, 28, 0.94);
    color: #fff;
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
    text-align: center;
  }
  .reminder {
    position: absolute;
    z-index: 4;
    width: 48px;
    aspect-ratio: 1;
    border-radius: 50%;
    border: 3px solid #16110a;
    background: #efd88e;
    display: grid;
    place-items: center;
    color: #16110a;
    font-size: 13px;
    font-weight: 900;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.55);
  }
  .poison-seat .reminder {
    right: -28px;
    bottom: 18px;
  }
  .drunk-seat .reminder {
    left: -28px;
    bottom: 18px;
  }
  .both-seat .reminder {
    right: -30px;
    top: 20px;
  }
  .body {
    padding: 15px 16px 18px;
    background: linear-gradient(180deg, rgba(3, 7, 9, 0.3), rgba(3, 7, 9, 0.82));
  }
  .body h3 {
    margin: 0 0 6px;
    color: white;
  }
  .body p {
    margin: 0;
    color: rgba(255, 255, 255, 0.74);
  }

  .drunk {
    animation: drunkWobble 2.15s ease-in-out infinite;
  }
  .drunk::after {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 4px solid rgba(91, 190, 255, 0.18);
    transform: translateX(7px);
    filter: blur(1px);
    animation: drunkAfterimage 2.15s ease-in-out infinite;
  }

  /* A4: cracked poison inside the token edge */
  .crack .poison::before,
  .crack .both::before {
    content: "";
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background:
      linear-gradient(115deg, transparent 0 36%, rgba(61, 230, 82, 0.78) 37% 39%, transparent 40%),
      linear-gradient(48deg, transparent 0 54%, rgba(34, 175, 72, 0.72) 55% 57%, transparent 58%),
      linear-gradient(168deg, transparent 0 46%, rgba(130, 255, 96, 0.6) 47% 48%, transparent 49%);
    mix-blend-mode: multiply;
    animation: poisonCrack 2.4s ease-in-out infinite;
    z-index: 3;
    pointer-events: none;
  }
  .crack .poison {
    filter: drop-shadow(0 0 10px rgba(54, 230, 87, 0.48));
  }

  /* B4: green corruption creeping from the rim */
  .rim .poison::before,
  .rim .both::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background:
      conic-gradient(from 210deg, transparent 0 12%, rgba(63, 235, 89, 0.72) 14% 28%, transparent 31% 52%, rgba(38, 167, 75, 0.66) 56% 70%, transparent 73%);
    mask: radial-gradient(circle, transparent 0 64%, #000 66% 76%, transparent 78%);
    -webkit-mask: radial-gradient(circle, transparent 0 64%, #000 66% 76%, transparent 78%);
    filter: blur(0.3px) drop-shadow(0 0 8px rgba(57, 230, 88, 0.62));
    animation: rimCreep 3.4s linear infinite;
    z-index: 3;
    pointer-events: none;
  }

  /* C4: sickly pulse through the token, understated */
  .sick .poison,
  .sick .both {
    animation: sickBreath 2.2s ease-in-out infinite;
  }
  .sick .poison::before,
  .sick .both::before {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 35%, rgba(64, 240, 92, 0.48), transparent 18%),
      radial-gradient(circle at 67% 65%, rgba(24, 145, 68, 0.42), transparent 23%);
    mix-blend-mode: multiply;
    animation: sickWash 2.8s ease-in-out infinite;
    z-index: 3;
    pointer-events: none;
  }

  .both {
    animation: drunkWobble 2.15s ease-in-out infinite;
  }
  .both::after {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 4px solid rgba(91, 190, 255, 0.16);
    transform: translateX(7px);
    filter: blur(1px);
    animation: drunkAfterimage 2.15s ease-in-out infinite;
  }

  @keyframes drunkWobble {
    0%, 100% {
      transform: rotate(-2.5deg) translate(-1px, 0);
    }
    50% {
      transform: rotate(3deg) translate(2px, -2px);
    }
  }
  @keyframes drunkAfterimage {
    0%, 100% {
      opacity: 0.18;
      transform: translateX(7px);
    }
    50% {
      opacity: 0.34;
      transform: translateX(-6px);
    }
  }
  @keyframes poisonCrack {
    0%, 100% {
      opacity: 0.4;
      transform: scale(0.96);
    }
    50% {
      opacity: 0.88;
      transform: scale(1.03);
    }
  }
  @keyframes rimCreep {
    to {
      transform: rotate(360deg);
    }
  }
  @keyframes sickBreath {
    0%, 100% {
      filter: drop-shadow(0 0 5px rgba(60, 230, 88, 0.26));
    }
    50% {
      filter: drop-shadow(0 0 15px rgba(60, 230, 88, 0.62));
    }
  }
  @keyframes sickWash {
    0%, 100% {
      opacity: 0.26;
      transform: translate(-4px, 3px) scale(0.95);
    }
    50% {
      opacity: 0.68;
      transform: translate(5px, -3px) scale(1.04);
    }
  }
  @media (max-width: 980px) {
    .arena {
      grid-template-columns: 1fr;
    }
  }
</style>
